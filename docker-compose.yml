services:
  assistant:
    build: .
    image: ha-assistant:latest
    container_name: ha-assistant
    restart: unless-stopped
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/snd:/dev/snd
    group_add:
      - audio
      - dialout
    volumes:
      - ./.env:/app/.env:ro
      - ./vosk-model:/opt/vosk-model
    environment:
      - ALSA_DEVICE=plughw:CARD=Bar,DEV=0
      - GSM_PORT=/dev/ttyUSB0
      - VOSK_MODEL_PATH=/opt/vosk-model
      - PIPER_BIN=/opt/piper/piper
      - PIPER_MODEL=/opt/piper-voices/fr_FR-siwis-medium.onnx
      - HA_URL=http://localhost:8123
      - HA_TOKEN=
      - MES_PIECES=Salon,Cuisine,Chambre,Cellier,Bureau,Exterieur,Pergola,Serre
      - RASPBERRY_PI_IP=maison.local
      - WHISPER_URL=http://localhost:8000/v1/audio/transcriptionsd
      - TRANSCRIPTION_MODE=vosk
      - PIPER_BIN=/opt/piper/piper
      - PIPER_MODEL=/opt/piper-voices/fr_FR-siwis-medium.onnx
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"